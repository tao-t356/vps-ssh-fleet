name: Validate

on:
  push:
  pull_request:

jobs:
  render-example-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render SSH config from example inventory
        run: python scripts/render_ssh_config.py --inventory inventory/hosts.example.yml --output generated/ssh_config

      - name: Validate quick key-login helper
        run: python scripts/enable_github_key_login.py --help

      - name: Validate VPS menu shell script
        run: bash -n ./ssh-key-menu.sh

      - name: Validate VPS bootstrap shell script
        run: bash -n ./bootstrap-vps.sh
